<div class="admin-chat">
  <h2>Admin Chat</h2>

  <div class="admin-chat__layout">
    <aside class="admin-chat__sidebar">
      <h3>Gespräche</h3>

      <div *ngIf="conversations.length === 0">Keine Gespräche vorhanden</div>

      <ul class="conversation-list">
        <li *ngFor="let c of conversations">
          <button
            type="button"
            class="conversation-button"
            (click)="selectConversation(c)"
          >
            {{ c.customer.name }} ({{ c.customer.email }})
          </button>
        </li>
      </ul>
    </aside>

    <section class="admin-chat__content">
      <h3 *ngIf="selected; else noSelect">
        Chat mit {{ selected.customer.name }}
      </h3>

      <ng-template #noSelect>
        <div class="admin-chat__empty">Wähle links ein Gespräch aus.</div>
      </ng-template>

      <div *ngIf="selected">
        <div class="messages-box">
          <div
            *ngFor="let m of messages"
            class="message-row"
            [ngClass]="m.senderRole === 'admin' ? 'message-row--admin' : 'message-row--customer'"
          >
            <div class="message-bubble">
              <strong>{{ m.senderRole === 'admin' ? 'Admin' : 'Kunde' }}:</strong>
              {{ m.text }}
              <div class="message-time">{{ m.createdAt | date:'HH:mm' }}</div>
            </div>
          </div>
        </div>

        <div class="reply-box">
          <input
            class="reply-input"
            type="text"
            placeholder="Antwort schreiben…"
            [(ngModel)]="replyText"
            (keydown.enter)="sendReply()"
          />
          <button class="reply-button" type="button" (click)="sendReply()">
            Senden
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
